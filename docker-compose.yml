services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synditech-app
    profiles:
      - prod
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    networks:
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: synditech-backend-dev
    profiles:
      - dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    networks:
      - coolify
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-build
    container_name: synditech-frontend-dev
    profiles:
      - dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      BACKEND_URL: http://backend:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
    networks:
      - coolify
    command: npm run dev
    depends_on:
      - backend

volumes:
  uploads:

networks:
  coolify:
    external: true
