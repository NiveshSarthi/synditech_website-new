version: '3.8'

services:
  app:
    build: .
    expose:
      - "5000"          # Expose app port only to Docker network (L6–L7)
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/synditech
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - synditech-network
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    expose:
      - "27017"         # Mongo accessible only inside Docker network
    volumes:
      - mongo-data:/data/db
    networks:
      - synditech-network
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  synditech-network:
    driver: bridge
