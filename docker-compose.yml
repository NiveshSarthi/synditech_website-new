services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synditech-app
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-http://localhost:5000}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5000}
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  uploads:
